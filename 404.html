<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена - Retivo</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='9' fill='%23141413'/%3E%3Cpath d='M11.5 23.8A9 9 0 1 1 20.5 23.8' fill='none' stroke='%23F3F0EE' stroke-width='2.6' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='7' r='2.4' fill='%23CF4500'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400..800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F3F0EE;--text:#141413;--muted:#555;--accent:#CF4500;--accent2:#F37338;--ink:#141413;--on-ink:#F3F0EE;--font:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);font-weight:450;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased;position:relative;overflow:hidden}
  body::before{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(50% 45% at 50% 0%,rgba(243,115,56,.12),transparent 60%)}
  ::selection{background:var(--text);color:var(--bg)}
  .mark{width:64px;height:64px;margin-bottom:28px}
  .code{font-size:clamp(72px,16vw,128px);font-weight:800;letter-spacing:-.05em;line-height:.9;color:var(--text)}
  h1{font-size:clamp(22px,4vw,30px);font-weight:600;letter-spacing:-.02em;margin:14px 0 10px}
  p{color:var(--muted);font-size:16px;max-width:420px;line-height:1.5;margin-bottom:30px}
  .btn{display:inline-flex;align-items:center;gap:9px;background:var(--ink);color:var(--on-ink);border:1.5px solid var(--ink);
    border-radius:100px;padding:14px 30px;font-size:16px;font-weight:500;letter-spacing:-.01em;text-decoration:none;transition:.2s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(0,0,0,.12)}
</style>
</head>
<body>
  <span class="mark"><svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="9" fill="#141413"/><path d="M11.5 23.8A9 9 0 1 1 20.5 23.8" fill="none" stroke="#F3F0EE" stroke-width="2.6" stroke-linecap="round"/><circle cx="16" cy="7" r="2.4" fill="#CF4500"/></svg></span>
  <div class="code">404</div>
  <h1>Страница не найдена</h1>
  <p>Похоже, такой страницы нет или она была перемещена. Вернёмся на главную.</p>
  <a class="btn" href="/">На главную</a>
</body>
</html>
